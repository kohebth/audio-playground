name: chorus
version: 1.0.0

system:
  sample_rate: 48000
  channel: 0

params:
  rate:
    min: 0.1
    max: 20.0
    default: 5.0
    unit: Hz
  depth:
    min: 0.0
    max: 1000.0
    default: 150.0
    unit: samples
  mix:
    min: 0.0
    max: 1.0
    default: 0.5
    unit: linear

internal:
  waveform: 0

signals:
  - input
  - output
  - lfo_out
  - pre_out
  - mod_out
  - wet_signal

pipeline:
  - id: osc
    fn: generation_lfo
    out:
      signal: lfo_out
    in: ~
    config:
      frequency: ${params.rate}
      waveform: ${internal.waveform}
      phase_offset: 0.0
      sample_rate: ${context.sample_rate}
    state:
      phase: 0.0

  - id: emphasizer_eq
    fn: filter_biquad
    out:
      signal: pre_out
    in:
      signal: ${signals.input}
    config:
      b0: 1.815099
      b1: -2.789923
      b2: 1.135624
      a1: -1.358169
      a2: 0.518969
    state:
      z1: 0.0
      z2: 0.0

  - id: modulate
    fn: modulation_phase
    out:
      signal: mod_out
    in:
      signal: pre_out
      modulator: lfo_out
    config:
      depth: ${params.depth}
    state: ~

  - id: de_emphasizer_eq
    fn: filter_biquad
    out:
      signal: wet_signal
    in:
      signal: mod_out
    config:
      b0: 0.550934
      b1: -0.748262
      b2: 0.285918
      a1: -1.537064
      a2: 0.625654
    state:
      z1: 0.0
      z2: 0.0

  - id: blend
    fn: mix_wet_dry
    out:
      signal: ${signals.output}
    in:
      dry: ${signals.input}
      wet: wet_signal
    config:
      mix: ${params.mix}
    state: ~